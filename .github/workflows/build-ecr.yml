name: Build and Push to ECR

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - src/**
      - scripts/**
      - index.js
      - package.json
      - package-lock.json
      - .github/workflows/build-ecr.yml
      - .github/workflows/deploy-eks.yml
      - k8s/**

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      image_uri: ${{ steps.build_push.outputs.image_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (Access Keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Validate required inputs
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "ERROR: Missing required secrets AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY" >&2
            exit 1
          fi

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build_push
        env:
          ECR_URI: 246571967396.dkr.ecr.us-east-1.amazonaws.com/duoc-lab
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_URI}:${IMAGE_TAG}"
          echo "Building image: ${IMAGE_URI}"
          docker build --pull --tag "${IMAGE_URI}" .
          echo "Pushing image: ${IMAGE_URI}"
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Image published successfully: ${IMAGE_URI}"

  deploy:
    name: Trigger EKS deploy
    needs: build
    uses: ./.github/workflows/deploy-eks.yml
    permissions:
      contents: read
      id-token: write
    with:
      image-uri: ${{ needs.build.outputs.image_uri }}
    secrets: inherit
