name: "Template: Deploy EKS (v1.0.0)"

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      eks-cluster-name:
        required: true
        type: string
      image-tag:
        description: "Tag de la imagen a desplegar"
        required: true
        type: string
      deployment-name:
        description: "Nombre del deployment en K8s"
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Configurar Kubectl para EKS
        uses: aws-actions/eks-set-context@v4
        with:
          cluster-name: ${{ inputs.eks-cluster-name }}
          aws-region: ${{ inputs.aws-region }}

      - name: Desplegar Nueva Imagen en EKS (Rolling Update)
        run: |
          # Actualiza la imagen del contenedor dinámicamente sin tocar el YAML original
          kubectl set image deployment/${{ inputs.deployment-name }} ${{ inputs.deployment-name }}=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ inputs.aws-region }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:${{ inputs.image-tag }}
          
          # Espera a que el rollout termine para verificar estabilidad
          kubectl rollout status deployment/${{ inputs.deployment-name }} --timeout=300s
