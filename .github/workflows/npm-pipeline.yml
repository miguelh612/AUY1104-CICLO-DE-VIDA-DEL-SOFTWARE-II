name: Build and Test

on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, reopened, synchronize] # Activadores para CI

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout del Código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar Dependencias
        run: npm ci
      
      - name: 🔒 Verificar Compliance
        run: npm audit

      - name: 🧪 Ejecutar Pruebas Automatizadas (Unidad/Integración)
        run: npm test