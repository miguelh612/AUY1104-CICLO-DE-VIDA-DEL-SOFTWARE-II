name: Template Despliegue ECS

on:
  workflow_call:
    inputs:
      # --- Inputs obligatorios para el despliegue ---
      strategy:
        description: 'Estrategia a Ejecutar (must be: rolling-update, recreate, blue-green, or canary)'
        required: true
        type: string
      cluster_name:
        description: 'Nombre del Cluster ECS'
        required: true
        type: string
      aws_region:
        description: 'Región de AWS'
        required: true
        type: string
      
      # --- Inputs opcionales (parametrización para portabilidad) ---
      k8s_yaml_path:
        description: 'Ruta al archivo YAML de Kubernetes (usado por la estrategia seleccionada)'
        required: false
        type: string
        default: ''
      k8s_yaml_path_rolling:
        description: 'Ruta al archivo YAML para Rolling Update (sobreescribe k8s_yaml_path)'
        required: false
        type: string
        default: ''
      deployment_name_rolling:
        description: 'Nombre del Deployment para Rolling Update'
        required: false
        type: string
        default: 'duoc-app-rolling'
      
      k8s_yaml_path_recreate:
        description: 'Ruta al archivo YAML para Recreate (sobreescribe k8s_yaml_path)'
        required: false
        type: string
        default: ''
      deployment_name_recreate:
        description: 'Nombre del Deployment para Recreate'
        required: false
        type: string
        default: 'duoc-app-recreate'
      
      k8s_yaml_path_green:
        description: 'Ruta al archivo YAML para entorno Green (Blue/Green) (sobreescribe k8s_yaml_path)'
        required: false
        type: string
        default: ''
      deployment_green_name:
        description: 'Nombre del Deployment Green (Blue/Green)'
        required: false
        type: string
        default: 'duoc-app-green'
      service_bg_name:
        description: 'Nombre del Servicio para el Switch de tráfico (Blue/Green)'
        required: false
        type: string
        default: 'duoc-app-bg-service'
      
      k8s_yaml_path_canary:
        description: 'Ruta al archivo YAML para entorno Canary (sobreescribe k8s_yaml_path)'
        required: false
        type: string
        default: ''
      deployment_canary_name:
        description: 'Nombre del Deployment Canary (v2)'
        required: false
        type: string
        default: 'duoc-app-canary-v2'
      stable_deployment_name:
        description: 'Nombre del Deployment Estable (v1)'
        required: false
        type: string
        default: 'duoc-app-stable-v1'
      canary_total_replicas:
        description: 'Número total de réplicas tras la promoción'
        required: false
        type: number
        default: 3

    secrets:
      AWS_ACCESS_KEY_ID:
        description: 'Access Key ID de AWS'
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: 'Secret Access Key de AWS'
        required: true
      AWS_SESSION_TOKEN:
        description: 'Session Token de AWS'
        required: true

jobs:
  deploy:
    name: Desplegar en EKS
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    
    steps:
      # 1. ⬇️ Checkout Código
      - name: Checkout Código
        uses: actions/checkout@v4

      # 2. Configurar Credenciales AWS (Se unificó en un solo paso válido)
      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws_region }}

      # 3. Configurar Kubectl para EKS
      - name: Configurar Kubectl para EKS
        uses: aws-actions/eks-set-context@v4
        with:
          cluster-name: ${{ inputs.cluster_name }}
          aws-region: ${{ inputs.aws_region }}
      
      # 4. Bloques condicionales por Estrategia
      
      # 4.1. 🔄 ROLLING UPDATE
      - name: 🔄 Ejecutar Rolling Update (Default)
        if: ${{ inputs.strategy == 'rolling-update' }}
        run: |
          echo "Aplicando YAML para Rolling Update..."
          kubectl apply -f ${{ inputs.k8s_yaml_path_rolling || inputs.k8s_yaml_path }}
          kubectl rollout status deployment/${{ inputs.deployment_name_rolling }} --timeout=300s

      # 4.2. ❌ RECREATE
      - name: ❌ Ejecutar Recreate (All-in-once)
        if: ${{ inputs.strategy == 'recreate' }}
        run: |
          echo "Aplicando YAML para Recreate..."
          kubectl apply -f ${{ inputs.k8s_yaml_path_recreate || inputs.k8s_yaml_path }}
          kubectl rollout status deployment/${{ inputs.deployment_name_recreate }} --timeout=300s
          
      # 4.3. 🟦 BLUE/GREEN
      - name: 🟦 Ejecutar Blue/Green (kubectl patch)
        if: ${{ inputs.strategy == 'blue-green' }}
        run: |
          kubectl apply -f ${{ inputs.k8s_yaml_path_green || inputs.k8s_yaml_path }}
          kubectl rollout status deployment/${{ inputs.deployment_green_name }} --timeout=300s
          sleep 120
          kubectl patch service ${{ inputs.service_bg_name }} -p '{"spec": {"selector": {"version": "green"}}}'
          
      # 4.4. 🐥 CANARY
      - name: 🐥 Ejecutar Canary (kubectl scale)
        if: ${{ inputs.strategy == 'canary' }}
        run: |
          TOTAL_REPLICAS=${{ inputs.canary_total_replicas }} 
          kubectl apply -f ${{ inputs.k8s_yaml_path_canary || inputs.k8s_yaml_path }}
          kubectl rollout status deployment/${{ inputs.deployment_canary_name }} --timeout=300s
          sleep 120
          kubectl scale deployment/${{ inputs.deployment_canary_name }} --replicas=$TOTAL_REPLICAS
          kubectl scale deployment/${{ inputs.stable_deployment_name }} --replicas=0
          kubectl rollout status deployment/${{ inputs.deployment_canary_name }} --timeout=300s
